experiences:
    - role: Research assistant
      time: July 2016 - December 2018
      company: UTFSM, Valparaíso, Chile
      details: |
        Assistance for a government-funded project called "Collaborative drones and multimodal vision for monitoring automation of wildfires".
        its aims were to study the reliability of using multiple drones for detection, monitoring, and analysis of wildfires. Worked at different stages:

          - Selection of tools and framework.
          - Development of the navigation UI and communication between multiple entities in the system.
          - Research of collaborative drones methods for wildfire analysis.
          - A thesis in Structure From Motion for real-time 3D mapping.

        For mor info in the project, visit [here](//wildfirewatch.elo.utfsm.cl/).

    - role: Research internship
      time: January 2018 - July 2018
      company: Universite de Moncton, Moncton, Canada
      details: |
          Thanks to the Canada-Chile Leadership Exchange Scholarships, I went for six months with a work visa as a researcher. 
          Made one publication in SPIE conference, and the first experience in English dominant country.

    - role: Professional Internship
      time: December 2016 - February 2017
      company: Cotalker S.P.A, Santiago, Chile
      details: |
          Development of tools for automation of unit testing, compression and minification processes in the continuous integration pipeline for the
          WebApp of [Cotalker](https://www.cotalker.com/landing).

    - role: Industrial internship
      time: January 2016 - March 2016
      company:  Alstom Chile S.A, Santiago, Chile
      details: |
          Build a minimal web platform for acquisition, storage and online visualization of data from testing devices mounted on train's engines while 
          they were operative.

    - role: Teaching & Laboratory assistant
      time: 2015 - 2018
      company: UTFSM,  Valparaíso, Chile
      details: |
          On three instances during my studies worked as assistant for a class:

            - 2015: Computer structures laboratory. Helped students developing laboratory activities and their projects.
            - 2017: Digital image processing class and laboratory. Prepared the lab activities and corrections of quizzes.
            - 2018: Digital image processing class and laboratory.

