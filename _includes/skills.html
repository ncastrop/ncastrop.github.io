{% assign skills = site.data.data.skills %}
  {% if skills %}
  <!--Skills-->
  <div class="skillset-cv container-block">

    <h2 class="section-title container-block-title">
      {{ skills.title }}
    </h2>
    {% for skill in skills.toolset %}
    <div class="item">

      <h3 class="level-title">{{ skill.name }}</h3>

      <div class="level-bar">
        <div class="level-bar-inner" data-level="{{ skill.level }}">
        </div>
      </div><!--//level-bar-->

    </div><!--//item-->
    {% endfor %}
  {%endif%}
